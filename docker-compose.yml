services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: air_quality
      POSTGRES_USER: air_admin
      POSTGRES_PASSWORD: air_admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://air_admin:air_admin@db:5432/air_quality
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,https://ai-sp0f.onrender.com
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
